<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나를 잡아봐!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f4f8 0%, #d4e8f0 50%, #f0e6fa 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      cursor: none;
    }

    .cursor-follower {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(100, 120, 140, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.05s ease-out;
    }

    .game-area {
      position: relative;
      width: min(90vw, 800px);
      height: min(70vh, 500px);
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(180, 200, 220, 0.6);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(150, 170, 200, 0.2);
      overflow: hidden;
    }

    .dot {
      position: absolute;
      width: 22px;
      height: 22px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 30% 30%, #555, #1a1a1a);
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.4);
      transition: left 0.15s ease-out, top 0.15s ease-out;
      cursor: none;
      z-index: 10;
    }

    .dot::after {
      content: '';
      position: absolute;
      inset: 2px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.15), transparent);
      border-radius: 50%;
    }

    h1 {
      color: #2d3e50;
      margin-bottom: 1rem;
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    .hint {
      color: #5a6c7d;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .score {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #4a5f73;
      font-size: 1.2rem;
    }

    .caught {
      animation: caught 0.4s ease-out;
    }

    @keyframes caught {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>
  <div class="cursor-follower" id="cursorFollower"></div>
  <h1>나를 잡아봐!</h1>
  <p class="hint">점에 마우스를 가져가 보세요.</p>
  <div class="game-area" id="gameArea">
    <div class="dot" id="dot"></div>
  </div>
  <div class="score" id="score">클릭 시도: 0</div>

  <script>
    const dot = document.getElementById('dot');
    const gameArea = document.getElementById('gameArea');
    const cursorFollower = document.getElementById('cursorFollower');
    const scoreEl = document.getElementById('score');

    const PADDING = 20;
    const EVADE_RADIUS = 80;
    const DOT_SIZE = 22;
    let clickAttempts = 0;

    function getBounds() {
      const rect = gameArea.getBoundingClientRect();
      const half = DOT_SIZE / 2;
      return {
        left: rect.left + PADDING + half,
        right: rect.right - PADDING - half,
        top: rect.top + PADDING + half,
        bottom: rect.bottom - PADDING - half,
        width: 0,
        height: 0
      };
    }

    function initBounds() {
      const b = getBounds();
      b.width = b.right - b.left;
      b.height = b.bottom - b.top;
      return b;
    }

    function randomPosition() {
      const b = initBounds();
      return {
        x: b.left + Math.random() * b.width,
        y: b.top + Math.random() * b.height
      };
    }

    function setDotPosition(centerX, centerY) {
      const b = initBounds();
      const clampedX = Math.max(b.left, Math.min(b.right, centerX));
      const clampedY = Math.max(b.top, Math.min(b.bottom, centerY));
      const rect = gameArea.getBoundingClientRect();
      dot.style.left = (clampedX - rect.left) + 'px';
      dot.style.top = (clampedY - rect.top) + 'px';
    }

    function getDotCenter() {
      const rect = dot.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
      };
    }

    gameArea.addEventListener('mousemove', (e) => {
      const mx = e.clientX;
      const my = e.clientY;
      cursorFollower.style.left = (mx - 10) + 'px';
      cursorFollower.style.top = (my - 10) + 'px';

      const center = getDotCenter();
      const dx = center.x - mx;
      const dy = center.y - my;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < EVADE_RADIUS) {
        const angle = Math.atan2(dy, dx);
        const runDistance = EVADE_RADIUS - dist + 30;
        const newX = center.x + Math.cos(angle) * runDistance;
        const newY = center.y + Math.sin(angle) * runDistance;
        setDotPosition(newX, newY);
      }
    });

    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      dot.classList.add('caught');
      setTimeout(() => dot.classList.remove('caught'), 400);
      const pos = randomPosition();
      setDotPosition(pos.x, pos.y);
    });

    gameArea.addEventListener('click', (e) => {
      if (e.target !== dot) {
        clickAttempts++;
        scoreEl.textContent = '클릭 시도: ' + clickAttempts;
      }
    });

    const initial = randomPosition();
    setDotPosition(initial.x, initial.y);
  </script>
</body>
</html>
